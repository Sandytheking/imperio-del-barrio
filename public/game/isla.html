<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>🏝️ Isla Privada</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Nunito',sans-serif}
#wrapper{width:100vw;max-width:1280px;aspect-ratio:16/9;position:relative;background:#0a1e2a;overflow:hidden}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#header{position:absolute;top:0;left:0;right:0;height:10.5%;background:linear-gradient(180deg,#06121a,#0c1e2e);border-bottom:3px solid #00C9A7;display:flex;align-items:center;padding:0 1.5%;gap:2%;z-index:20}
.hm-block{display:flex;flex-direction:column;min-width:17%}
.hm-label{font-size:clamp(6px,.65vw,10px);font-weight:900;color:#445;text-transform:uppercase;letter-spacing:1px}
.hm-val{font-family:'Fredoka One',cursive;font-size:clamp(15px,2vw,30px);color:#00C9A7;line-height:1}
.hm-sub{font-size:clamp(6px,.6vw,9px);font-weight:900;color:#4cd964}
.hdr-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.level-name{font-family:'Fredoka One',cursive;font-size:clamp(9px,1vw,15px);color:#fff}
.xp-bg{width:100%;max-width:300px;height:8px;background:rgba(255,255,255,.08);border-radius:99px;border:1px solid rgba(255,255,255,.12);overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,#00C9A7,#FFD700);border-radius:99px;transition:width .4s ease}
.xp-lbl{font-size:clamp(5px,.55vw,8px);color:#888;font-weight:900}
.hdr-right{display:flex;align-items:center;gap:.8%;min-width:22%;justify-content:flex-end}
.hbtn{background:#0a1e2e;color:#fff;font-family:'Fredoka One',cursive;font-size:clamp(8px,.85vw,13px);padding:.35em .8em;border:2px solid rgba(255,255,255,.12);border-radius:99px;cursor:pointer;transition:transform .1s}
.hbtn:hover{transform:translateY(-2px)}
.hbtn.red{background:#0a3028;border-color:#00C9A7}
.combo-badge{background:linear-gradient(135deg,#00C9A7,#FFD700);color:#000;font-family:'Fredoka One',cursive;font-size:clamp(7px,.75vw,11px);padding:.3em .7em;border-radius:99px;border:2px solid rgba(255,255,255,.3);display:none;animation:cbPop .4s cubic-bezier(.34,1.56,.64,1)}
.combo-badge.show{display:block}@keyframes cbPop{from{transform:scale(0)}to{transform:scale(1)}}
#panel{position:absolute;bottom:0;left:0;right:0;height:27%;background:linear-gradient(0deg,#06121a,#0c1e2e);border-top:3px solid #00C9A7;display:grid;grid-template-columns:repeat(5,1fr);z-index:20}
.upg-col{border-right:1px solid rgba(255,255,255,.05);padding:clamp(4px,.7vw,10px) clamp(5px,.9vw,12px);display:flex;flex-direction:column;gap:4px}
.upg-col:last-child{border-right:none}
.upg-top{display:flex;align-items:center;gap:5px}
.upg-emo{font-size:clamp(12px,1.6vw,24px)}
.upg-title{font-family:'Fredoka One',cursive;font-size:clamp(8px,.95vw,14px);color:#fff;flex:1}
.upg-lv{background:#00C9A7;color:#000;font-weight:900;font-size:clamp(5px,.58vw,9px);padding:2px 5px;border-radius:99px}
.upg-stat{font-size:clamp(6px,.62vw,9px);color:#aaa;font-weight:700;line-height:1.3}
.upg-stat b{color:#4cd964}
.upg-btn{margin-top:auto;background:linear-gradient(135deg,#00C9A7,#009e82);color:#000;font-family:'Fredoka One',cursive;font-size:clamp(8px,.85vw,13px);padding:.4em .8em;border:none;border-radius:99px;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.4);transition:transform .1s;width:100%;font-weight:900}
.upg-btn:hover:not(:disabled){transform:translateY(-2px)}
.upg-btn:disabled{background:linear-gradient(135deg,#333,#2a2a2a);color:#555;cursor:not-allowed;box-shadow:none}
#achiev{position:absolute;top:13%;right:2%;z-index:50;pointer-events:none;display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.ach-item{background:linear-gradient(135deg,#06121a,#0c1e2e);border:2px solid #00C9A7;border-radius:12px;padding:8px 14px;display:flex;align-items:center;gap:8px;animation:achIn .4s cubic-bezier(.34,1.56,.64,1),achOut .4s ease 3.5s forwards;max-width:260px}
@keyframes achIn{from{transform:translateX(120%);opacity:0}to{transform:none;opacity:1}}
@keyframes achOut{to{opacity:0;transform:translateX(120%)}}
.ach-icon{font-size:1.4rem}.ach-title{font-family:'Fredoka One',cursive;font-size:.8rem;color:#00C9A7}.ach-desc{font-size:.6rem;color:#aaa;font-weight:700}
#notiflog{position:absolute;bottom:28%;left:1.5%;z-index:30;pointer-events:none;display:flex;flex-direction:column-reverse;gap:3px}
.nlog{font-size:clamp(7px,.68vw,10px);font-weight:900;padding:3px 9px;border-radius:5px;background:rgba(0,0,0,.65);animation:nIn .25s ease,nOut .3s ease 3s forwards;border-left:3px solid #00C9A7;color:#fff;max-width:270px}
.nlog.good{border-color:#4cd964;color:#4cd964}.nlog.bad{border-color:#e74c3c;color:#e74c3c}.nlog.special{border-color:#FFD700;color:#FFD700}
@keyframes nIn{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:none}}
@keyframes nOut{to{opacity:0;transform:translateX(-18px)}}
#flash{position:absolute;inset:0;pointer-events:none;z-index:60;opacity:0}
#flash.pop{animation:flashPop .35s ease}
@keyframes flashPop{0%{opacity:.3}100%{opacity:0}}
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="c"></canvas>
  <div id="header">
    <div class="hm-block">
      <div class="hm-label">💰 Caja</div>
      <div class="hm-val" id="hMoney">$0</div>
      <div class="hm-sub" id="hIPS">+$0/seg</div>
    </div>
    <div class="hdr-center">
      <div class="level-name" id="hLevel">🏝️ Isla Privada</div>
      <div class="xp-bg"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
      <div class="xp-lbl" id="xpLbl">0 / 100 XP</div>
    </div>
    <div class="hdr-right">
      <div class="combo-badge" id="comboBadge">🔥 COMBO x1</div>
      <button class="hbtn red" onclick="activateBoost()">⚡ Boost x2 — $5000</button>
    </div>
  </div>
  <div id="panel">
    <div class="upg-col">
      <div class="upg-top"><span class="upg-emo">🏖️</span><span class="upg-title">Más Villas</span><span class="upg-lv" id="lv_villas">Nv.1</span></div>
      <div class="upg-stat" id="st_villas"><b>Capacidad +1</b></div>
      <button class="upg-btn" id="btn_villas" onclick="buyUpg('villas')" disabled>🏖️ Mejorar $...</button>
    </div>
    <div class="upg-col">
      <div class="upg-top"><span class="upg-emo">🤿</span><span class="upg-title">Actividades VIP</span><span class="upg-lv" id="lv_actividades">Nv.1</span></div>
      <div class="upg-stat" id="st_actividades"><b>Ciclo -20%</b></div>
      <button class="upg-btn" id="btn_actividades" onclick="buyUpg('actividades')" disabled>🤿 Mejorar $...</button>
    </div>
    <div class="upg-col">
      <div class="upg-top"><span class="upg-emo">🍾</span><span class="upg-title">Bar Infinity</span><span class="upg-lv" id="lv_bar">Nv.1</span></div>
      <div class="upg-stat" id="st_bar"><b>Precio +30%</b></div>
      <button class="upg-btn" id="btn_bar" onclick="buyUpg('bar')" disabled>🍾 Mejorar $...</button>
    </div>
    <div class="upg-col">
      <div class="upg-top"><span class="upg-emo">💎</span><span class="upg-title">Suite Presidencial</span><span class="upg-lv" id="lv_suite">Nv.1</span></div>
      <div class="upg-stat" id="st_suite"><b>Precio +35%</b></div>
      <button class="upg-btn" id="btn_suite" onclick="buyUpg('suite')" disabled>💎 Mejorar $...</button>
    </div>
    <div class="upg-col">
      <div class="upg-top"><span class="upg-emo">✈️</span><span class="upg-title">Jet Privado</span><span class="upg-lv" id="lv_jet">Nv.1</span></div>
      <div class="upg-stat" id="st_jet"><b>Más huéspedes</b></div>
      <button class="upg-btn" id="btn_jet" onclick="buyUpg('jet')" disabled>✈️ Mejorar $...</button>
    </div>
  </div>
  <div id="achiev"></div>
  <div id="notiflog"></div>
  <div id="flash"></div>
</div>
<script>
const SHIRTS=['#fff','#FFD700','#00C9A7','#FF4FAD','#9B5DE5','#FF8C42','#5BC8F5','#e74c3c','#F7931A','#2DC653'];
const PANTS=['#1a3040','#1b3a50','#1a2540','#2c4060','#16303e','#1a2a3e','#253545','#1e3548'];
const SKINS=['#FDBCB4','#E8975A','#C07A3A','#8B5E3C','#6B3E26','#4A2C0A'];
const HAIRS=['#1a1a1a','#4a2c0a','#C07A3A','#FFD200','#e8e8e8','#FF4757','#00C9A7'];

let particles=[],floats=[],bills=[];
function spawnParticles(x,y,color,n=12){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=40+Math.random()*80;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-40,life:1,color,r:2+Math.random()*3});}}
function spawnFloat(x,y,text,color='#00C9A7',big=false){floats.push({x,y:y-5,text,t:0,color,big});}
function spawnBills(x,y){for(let i=0;i<8;i++)bills.push({x:x+(Math.random()-.5)*60,y,vx:(Math.random()-.5)*50,vy:-70-Math.random()*50,life:1,rot:Math.random()*Math.PI,rotV:(Math.random()-.5)*3});}
function updateFX(dt){particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=180*dt;p.life-=dt*1.4;});particles=particles.filter(p=>p.life>0);floats.forEach(f=>{f.y-=28*dt;f.t+=dt;});floats=floats.filter(f=>f.t<1.8);bills.forEach(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt;b.vy+=120*dt;b.rot+=b.rotV*dt;b.life-=dt*1.2;});bills=bills.filter(b=>b.life>0);}
function drawFX(){particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();});bills.forEach(b=>{ctx.save();ctx.globalAlpha=b.life*.8;ctx.translate(b.x,b.y);ctx.rotate(b.rot);rr(-13,-6,26,12,3,'#2DC653','#1a5c28',1.5);ctx.font=`bold 8px Nunito`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#1a5c28';ctx.fillText('$',0,0);ctx.restore();});floats.forEach(f=>{const alpha=Math.max(0,1-f.t/1.6);const fs=f.big?~~(CW*.016):~~(CW*.013);ctx.save();ctx.globalAlpha=alpha;ctx.font=`900 ${fs}px "Fredoka One",cursive`;ctx.textAlign='center';ctx.textBaseline='middle';const tw=ctx.measureText(f.text).width,pad=f.big?12:8;rr(f.x-tw/2-pad,f.y-fs/2-4,tw+pad*2,fs+9,6,'rgba(0,0,0,.65)',f.color,f.big?2.5:1.5);ctx.fillStyle=f.color;ctx.fillText(f.text,f.x,f.y);ctx.restore();});ctx.globalAlpha=1;}
function rr(x,y,w,h,r,fill,stroke,lw=2){ctx.beginPath();ctx.roundRect(x,y,w,h,r);if(fill){ctx.fillStyle=fill;ctx.fill();}if(stroke){ctx.lineWidth=lw;ctx.strokeStyle=stroke;ctx.stroke();}}
function txt(t,x,y,font,color,align='center'){ctx.font=font;ctx.fillStyle=color;ctx.textAlign=align;ctx.textBaseline='middle';ctx.fillText(t,x,y);}

function drawPerson(cfg){
  const {x,y,scale:sc=1,state='idle',progress=0,isVIP=false,skin,shirt,pants,hair,isAngry=false,expr=0,bob=0,ws=1,tool=null}=cfg;
  const s=sc*(CW/1280);
  ctx.save();ctx.translate(x,y);ctx.scale(s,s);
  const ls=Math.sin(bob)*8;
  ctx.save();ctx.translate(-6*ws,0);ctx.rotate(ls*Math.PI/180);rr(-5*ws,0,10*ws,22,3,pants,'#1a1a2e',1.5);rr(-7*ws,20,13*ws,8,2,'#8B6914','#1a1a2e',1.2);ctx.restore();
  ctx.save();ctx.translate(6*ws,0);ctx.rotate(-ls*Math.PI/180);rr(-5*ws,0,10*ws,22,3,pants,'#1a1a2e',1.5);rr(-5*ws,20,13*ws,8,2,'#8B6914','#1a1a2e',1.2);ctx.restore();
  const bodyY=Math.sin(bob+Math.PI*.5)*2;ctx.save();ctx.translate(0,bodyY);
  rr(-16*ws,-26,32*ws,30,7,shirt,'#1a1a2e',1.5);rr(-7*ws,-26,14*ws,8,2,'rgba(255,255,255,.18)',null);
  const arm=Math.sin(bob+Math.PI)*6;
  ctx.save();ctx.translate(-16*ws,-20);ctx.rotate(arm*Math.PI/180);rr(-4*ws,0,8*ws,18,3,skin,'#1a1a2e',1.2);ctx.restore();
  ctx.save();ctx.translate(16*ws,-20);ctx.rotate(-arm*Math.PI/180);rr(-4*ws,0,8*ws,18,3,skin,'#1a1a2e',1.2);ctx.restore();
  if(tool){ctx.font=`${~~18}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(tool,26*ws,-16);}
  rr(-17*ws,-62,34*ws,36,[14,14,12,12],skin,'#1a1a2e',2);
  ctx.beginPath();ctx.ellipse(0,-62,17*ws,12,0,Math.PI,0);ctx.fillStyle=hair;ctx.fill();ctx.strokeStyle='#1a1a2e';ctx.lineWidth=1.5;ctx.stroke();
  if(isVIP){ctx.font='16px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('👑',0,-80);}
  [[-7,-51],[7,-51]].forEach(([ex,ey])=>{rr(ex-5.5,ey-6,11,12,[5,5,5,5],'white','#1a1a2e',1.5);if(isAngry){ctx.save();ctx.translate(ex,ey);ctx.rotate(.3*(ex<0?1:-1));ctx.beginPath();ctx.ellipse(0,0,3.5,4.5,0,0,Math.PI*2);ctx.fillStyle='#1a1a2e';ctx.fill();ctx.restore();ctx.strokeStyle='#1a1a2e';ctx.lineWidth=2;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(ex-5,ey-7);ctx.lineTo(ex+5,ey-10);ctx.stroke();}else{ctx.beginPath();ctx.ellipse(ex+.5,ey-.5,3.5,4.5,0,0,Math.PI*2);ctx.fillStyle='#1a1a2e';ctx.fill();ctx.beginPath();ctx.arc(ex+1.5,ey-2,1.3,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();}});
  ctx.strokeStyle='#1a1a2e';ctx.lineWidth=1.5;ctx.beginPath();if(isAngry)ctx.arc(0,-42,5,.2,Math.PI-.2,true);else if(expr===0)ctx.arc(0,-42,6,.1,Math.PI-.1);else if(expr===2){ctx.arc(0,-42,7,.05,Math.PI-.05);ctx.fillStyle='#FF6B6B';ctx.fill();}else ctx.moveTo(-5,-42),ctx.lineTo(5,-42);ctx.stroke();
  ctx.restore();ctx.restore();
  if(state==='serving'||state==='seated'){const bw=52*s,bh=9,px2=x-bw/2,py2=y-(78)*s;rr(px2,py2,bw,bh,3,'rgba(0,0,0,.6)',null);const col=progress>.66?'#4cd964':progress>.33?'#00C9A7':'#e74c3c';rr(px2+2,py2+2,(bw-4)*progress,bh-4,2,col,null);rr(px2,py2,bw,bh,3,null,'rgba(0,0,0,.5)',1);txt(`${~~(progress*100)}%`,x,py2-9,`700 ${~~(8*s)}px Nunito`,col);}
  if(state==='waiting'){const patience=cfg.patience||1;const bw=42*s,bh=7,px2=x-bw/2,py2=y-(78)*s;rr(px2,py2,bw,bh,3,'rgba(0,0,0,.45)',null);const col=patience>.55?'#00C9A7':patience>.25?'#FF6348':'#e74c3c';rr(px2+1.5,py2+1.5,(bw-3)*patience,bh-3,2,col,null);const em=patience>.6?'😊':patience>.3?'😐':'😤';ctx.font=`${~~(11*s)}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(em,x,py2-11*s);}
}

const BIZ_ID='isla';const BIZ_ICON='🏝️';const BIZ_NAME='Isla Privada';const ACCENT='#00C9A7';
const MAX_SLOTS=4;const MAX_UPG_LV=10;
const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');
let CW,CH;function resize(){const wr=document.getElementById('wrapper');CW=canvas.width=wr.clientWidth;CH=canvas.height=wr.clientHeight;}resize();window.addEventListener('resize',resize);

const UPGS={villas:{lv:1,base:50000,icon:'🏖️',name:'Más Villas',desc:'Capacidad +1'},actividades:{lv:1,base:90000,icon:'🤿',name:'Actividades VIP',desc:'Ciclo -20%'},bar:{lv:1,base:150000,icon:'🍾',name:'Bar Infinity',desc:'Precio +30%'},suite:{lv:1,base:250000,icon:'💎',name:'Suite Presidencial',desc:'Precio +35%'},jet:{lv:1,base:400000,icon:'✈️',name:'Jet Privado',desc:'Más huéspedes'}};
function upgCost(k){const u=UPGS[k];return Math.floor(u.base*Math.pow(1.55,u.lv-1));}
function nSlots(){return Math.min(MAX_SLOTS,1+(UPGS.villas?.lv||1)-1);}
function cycleTime(){const spd=UPGS.actividades;return Math.max(1.5,BASE_CYCLE*(spd?Math.pow(0.82,spd.lv-1):1));}
function spawnRate(){const mkt=UPGS.jet;return Math.max(0.6,BASE_SPAWN*(mkt?Math.pow(0.85,mkt.lv-1):1));}
function earnPerServe(){let m=BASE_EARN;for(const k in UPGS){const u=UPGS[k];if(['bar','suite'].includes(k))m*=(1+(u.lv-1)*.25);}m*=(G.boost&&Date.now()<G.boostEnd?2:1);m*=(1+(_prestige*.2));return Math.floor(m);}

const BASE_EARN=10000;const BASE_CYCLE=18;const BASE_SPAWN=3;
let _prestige=0,_paused=false,_earnedQ=0;
const G={money:0,totalEarned:0,xp:0,level:0,served:0,combo:0,maxCombo:0,streak:0,boost:false,boostEnd:0,elapsed:0};
const LVL={names:['Visitante','Huésped','Residente','Socio','Dueño','Patriarca','Rey del Caribe'],xp:[300,800,2000,5000,12000,30000,80000]};
function xpReq(l){return LVL.xp[Math.min(l,LVL.xp.length-1)];}
function addXP(a){G.xp+=a;while(G.level<LVL.names.length-1&&G.xp>=xpReq(G.level)){G.xp-=xpReq(G.level);G.level++;triggerFlash(ACCENT+'44');showAchievement('🏆',`¡Nivel ${G.level+1}!`,LVL.names[G.level]);nlog(`🏆 Nivel ${G.level+1} — ${LVL.names[G.level]}`,'special');}}

let clients=[],spawnTimer=0,cid=0;
class Client{constructor(){this.id=cid++;this.x=CW*-.04;this.y=0;this.tx=CW*.12;this.state='entering';this.slotIdx=-1;this.progress=0;this.patience=1;this.speed=(80+Math.random()*40)*(CW/1280);this.bob=Math.random()*Math.PI*2;this.isVIP=Math.random()<.25;this.isAngry=false;this.skin=SKINS[~~(Math.random()*SKINS.length)];this.shirt=SHIRTS[~~(Math.random()*SHIRTS.length)];this.pants=PANTS[~~(Math.random()*PANTS.length)];this.hair=HAIRS[~~(Math.random()*HAIRS.length)];this.expr=~~(Math.random()*3);this.scale=this.isVIP?1.15:[.9,1,1,1.1][~~(Math.random()*4)];}}

let slots=[];
function initSlots(){const n=Math.min(MAX_SLOTS,nSlots());slots=buildSlots(n);}
function trySpawn(){const free=slots.findIndex((s,i)=>!s.occ&&i<nSlots());if(free<0)return;const c=new Client();c.y=slots[free].y;c.tx=CW*.11;clients.push(c);slots[free].occ=true;slots[free].cid=c.id;c.slotIdx=free;nlog(`${c.isVIP?'👑 Millonario':'🧳 '+(CUST_NAME)} llega`);}
function onServed(c){const inc=earnPerServe()*(c.isVIP?3:1)*(1+G.streak*.015);G.money+=inc;G.totalEarned+=inc;_earnedQ+=inc;addXP(inc*.1);G.served++;G.streak++;G.combo++;if(G.combo>G.maxCombo)G.maxCombo=G.combo;if(G.combo>=3){document.getElementById('comboBadge').textContent=`🔥 COMBO x${G.combo}`;document.getElementById('comboBadge').classList.add('show');}if(_earnedQ>=3){window.parent?.postMessage({type:'bizEarned',earned:_earnedQ,xp:_earnedQ*.08},'*');_earnedQ=0;}spawnFloat(c.x,c.y-70*(c.scale*(CW/1280)),`+$${fmt(inc)}`,c.isVIP?'#FFD700':'#4cd964',c.isVIP);spawnParticles(c.x,c.y-50*(c.scale*(CW/1280)),c.isVIP?'#FFD700':'#00C9A7',c.isVIP?22:12);if(c.isVIP||G.combo%5===0)spawnBills(c.x,c.y-60*(c.scale*(CW/1280)));nlog(`${EARN_VERB} +${fmt(inc)}${c.isVIP?' 👑 VIP':''}${G.combo>=3?' 🔥':''}`,c.isVIP?'special':'good');checkAchievements();if(c.slotIdx>=0){slots[c.slotIdx].occ=false;slots[c.slotIdx].cid=null;}c.slotIdx=-1;c.state='leaving';c.tx=CW*1.08;}
function onAngry(c){G.streak=0;G.combo=0;document.getElementById('comboBadge').classList.remove('show');if(c.slotIdx>=0){slots[c.slotIdx].occ=false;slots[c.slotIdx].cid=null;}c.slotIdx=-1;c.isAngry=true;c.state='leaving';c.tx=CW*-.08;spawnFloat(c.x,c.y-60*(c.scale*(CW/1280)),'😤 ¡Se fue!','#e74c3c');nlog('😤 ¡Huésped se fue enojado!','bad');checkAchievements();}
const ACHIEVEMENTS=[{id:'first',icon:'🎉',title:'¡Primer huésped!',desc:'Bienvenido al paraíso',check:()=>G.served>=1},{id:'ten',icon:'✨',title:'10 estadías',desc:'La isla florece',check:()=>G.served>=10},{id:'combo5',icon:'🔥',title:'Combo x5',desc:'¡Paraíso total!',check:()=>G.maxCombo>=5},{id:'rich',icon:'💰',title:'$100,000',desc:'Millones del caribe',check:()=>G.money>=100000},{id:'rich2',icon:'🤑',title:'$1,000,000',desc:'Rey del paraíso',check:()=>G.money>=1000000},];
const _ach={};function checkAchievements(){ACHIEVEMENTS.forEach(a=>{if(!_ach[a.id]&&a.check()){_ach[a.id]=1;showAchievement(a.icon,a.title,a.desc);}});}

// Yate animado
let yateX=1.1;let yateDir=-1;
// Olas
let waveOffset=0;

let gt=0,dt_ref=0.016;

function drawPalm(x,y,h,lean,color1,color2,s){
  // trunk
  ctx.save();ctx.translate(x,y);
  ctx.strokeStyle='#8B6914';ctx.lineWidth=6*s;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(lean*CW*.02,h*-.33,lean*CW*.04,h*-.66,lean*CW*.05,h*-1);ctx.stroke();
  // leaves
  const lx=x+lean*CW*.05, ly=y-h;
  [[-1.2,-.3],[-.8,-.7],[-.2,-1.1],[.4,-1.1],[1,-.7],[1.3,-.25]].forEach(([dx,dy])=>{
    ctx.save();ctx.translate(lx,ly);
    ctx.strokeStyle=color1;ctx.lineWidth=3.5*s;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(dx*CW*.04+Math.sin(gt*.8+dx)*.005*CW,dy*CW*.04,dx*CW*.07+Math.sin(gt*.8+dx)*.008*CW,dy*CW*.06);ctx.stroke();
    ctx.restore();
  });
  ctx.restore();
}

function drawScene(gt){
  const s=CW/1280,fy=CH*.73;
  waveOffset+=dt_ref*.5;

  // SUNSET SKY
  const skyG=ctx.createLinearGradient(0,0,0,fy);
  skyG.addColorStop(0,'#0a0520');skyG.addColorStop(.25,'#1a1040');skyG.addColorStop(.5,'#2a2060');skyG.addColorStop(.7,'#c44a20');skyG.addColorStop(.85,'#e86030');skyG.addColorStop(1,'#f09050');
  ctx.fillStyle=skyG;ctx.fillRect(0,0,CW,fy);

  // STARS (upper half)
  ctx.save();for(let i=0;i<50;i++){const sx=((i*137.5)%1)*CW,sy=((i*97.3)%1)*(fy*.35);const twinkle=.3+Math.sin(gt*1.2+i)*.25;ctx.globalAlpha=twinkle*.6;ctx.beginPath();ctx.arc(sx,sy,.7+Math.sin(i)*.5,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();}ctx.restore();

  // SUN setting on horizon
  const sunY=fy*.82;
  ctx.save();ctx.shadowColor='#FFD700';ctx.shadowBlur=40;
  const sunG=ctx.createRadialGradient(CW*.75,sunY,0,CW*.75,sunY,CW*.06);
  sunG.addColorStop(0,'#FFE566');sunG.addColorStop(.4,'#FF8C00');sunG.addColorStop(1,'rgba(255,80,0,0)');
  ctx.fillStyle=sunG;ctx.fillRect(CW*.69,sunY-CW*.06,CW*.12,CW*.12);ctx.restore();
  // Sun reflection on water
  ctx.save();ctx.globalAlpha=.4;
  const refG=ctx.createLinearGradient(CW*.65,fy*.78,CW*.85,fy);refG.addColorStop(0,'#FF8C00');refG.addColorStop(1,'transparent');
  ctx.fillStyle=refG;ctx.fillRect(CW*.65,fy*.78,CW*.2,fy*.22);ctx.restore();

  // OCEAN
  const oceanG=ctx.createLinearGradient(0,fy*.6,0,fy);
  oceanG.addColorStop(0,'#005580');oceanG.addColorStop(.4,'#007799');oceanG.addColorStop(.7,'#00aabb');oceanG.addColorStop(1,'#00C9A7');
  ctx.fillStyle=oceanG;ctx.fillRect(0,fy*.6,CW,fy*.4);
  // Waves
  for(let w=0;w<6;w++){
    ctx.save();ctx.globalAlpha=.15+w*.04;ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
    ctx.beginPath();
    for(let wx=0;wx<CW;wx+=4){const wy=fy*.6+w*CH*.014+Math.sin(wx/CW*Math.PI*6+waveOffset+w)*.006*CH;wx===0?ctx.moveTo(wx,wy):ctx.lineTo(wx,wy);}
    ctx.stroke();ctx.restore();
  }

  // SANDY BEACH
  const sandG=ctx.createLinearGradient(0,fy*.72,0,fy);
  sandG.addColorStop(0,'#c8a870');sandG.addColorStop(.5,'#d4b880');sandG.addColorStop(1,'#dfc898');
  ctx.fillStyle=sandG;
  ctx.beginPath();ctx.moveTo(0,fy);ctx.lineTo(0,fy*.78);ctx.bezierCurveTo(CW*.15,fy*.74,CW*.3,fy*.72,CW*.5,fy*.73);ctx.bezierCurveTo(CW*.65,fy*.735,CW*.8,fy*.75,CW,fy*.77);ctx.lineTo(CW,fy);ctx.closePath();ctx.fill();
  // Sand ripples
  ctx.save();ctx.globalAlpha=.12;ctx.strokeStyle='#a08040';ctx.lineWidth=1;
  for(let r=0;r<5;r++){ctx.beginPath();ctx.moveTo(CW*.1,fy*.83+r*CH*.016);ctx.bezierCurveTo(CW*.3,fy*.82+r*CH*.016,CW*.6,fy*.835+r*CH*.016,CW*.9,fy*.83+r*CH*.016);ctx.stroke();}ctx.restore();

  // PALM TREES
  drawPalm(CW*.08,fy*.82,CH*.3,-0.8,'#2DC653','#1a8c3c',s);
  drawPalm(CW*.14,fy*.81,CH*.28,.6,'#3daa4a','#2a7a30',s);
  drawPalm(CW*.88,fy*.8,CH*.32,0.9,'#2DC653','#1a8c3c',s);
  drawPalm(CW*.94,fy*.81,CH*.25,-0.5,'#3daa4a','#2a7a30',s);

  // YATE / YACHT
  yateX+=dt_ref*(yateDir*.018);if(yateX<.25||yateX>.85)yateDir*=-1;
  const yx=CW*yateX,yy=fy*.64+Math.sin(gt*.4)*CH*.005;
  ctx.save();ctx.translate(yx,yy);
  // Hull
  ctx.beginPath();ctx.moveTo(-CW*.06,0);ctx.lineTo(CW*.06,0);ctx.lineTo(CW*.05,CH*.025);ctx.lineTo(-CW*.05,CH*.025);ctx.closePath();ctx.fillStyle='#f0f0f0';ctx.fill();ctx.strokeStyle='#ccc';ctx.lineWidth=1.5;ctx.stroke();
  // Cabin
  rr(-CW*.04,-CH*.04,CW*.05,CH*.04,2,'#e0e8f0','#aac',1);
  rr(-CW*.015,-CH*.06,CW*.02,CH*.02,2,'rgba(180,220,255,.5)',null);
  // Mast
  ctx.strokeStyle='#888';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-CH*.12);ctx.stroke();
  // Sail
  ctx.save();ctx.globalAlpha=.85;ctx.beginPath();ctx.moveTo(0,-CH*.12);ctx.lineTo(CW*.04,-CH*.05);ctx.lineTo(0,0);ctx.closePath();ctx.fillStyle='#fff';ctx.fill();ctx.restore();
  // Wake
  ctx.save();ctx.globalAlpha=.3;ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.setLineDash([5,8]);ctx.beginPath();ctx.moveTo(yateDir>0?CW*.06:-CW*.06,CH*.02);ctx.lineTo(yateDir>0?CW*.18:-CW*.18,CH*.015);ctx.stroke();ctx.setLineDash([]);ctx.restore();
  ctx.restore();

  // LUXURY VILLA (main building)
  rr(CW*.22,CH*.08,CW*.56,CH*.56,8,'rgba(255,248,235,.95)','#FFD700',3);
  rr(CW*.225,CH*.09,CW*.55,CH*.54,6,'rgba(255,255,255,.6)',null);
  // Villa windows
  for(let row=0;row<3;row++)for(let col=0;col<5;col++){const wx=CW*(.25+col*.098),wy=CH*(.12+row*.13);ctx.save();ctx.shadowColor='#FFD700';ctx.shadowBlur=Math.sin(gt*.5+row+col)>0?6:0;rr(wx,wy,CW*.07,CH*.09,4,`rgba(255,${~~(200+Math.sin(gt*.3+col)*30)},${~~(50+Math.sin(gt*.5+row)*30)},.4)`,null);ctx.restore();}
  // Infinity pool on villa terrace
  rr(CW*.26,CH*.51,CW*.25,CH*.1,4,'#00C9A7','#008888',2);
  ctx.save();ctx.globalAlpha=.3;for(let w2=0;w2<3;w2++){ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.beginPath();for(let wx=CW*.26;wx<CW*.51;wx+=3){const wy=CH*(.525+w2*.028)+Math.sin(wx*.05+waveOffset+w2)*.003*CH;wx===CW*.26?ctx.moveTo(wx,wy):ctx.lineTo(wx,wy);}ctx.stroke();}ctx.restore();
  txt('∞ POOL',CW*.385,CH*.555,`900 ${~~(6*s)}px Nunito`,'rgba(255,255,255,.6)');
  // Bar on right side of villa
  rr(CW*.52,CH*.51,CW*.22,CH*.1,4,'rgba(139,90,20,.9)','#8B6914',2);
  txt('🍾 SKY BAR',CW*.63,CH*.555,`900 ${~~(6*s)}px Nunito`,'#FFD700');

  // VILLA SIGN
  ctx.save();ctx.shadowColor='#FFD700';ctx.shadowBlur=20+Math.sin(gt*1.2)*8;
  rr(CW*.28,CH*.008,CW*.44,CH*.075,8,'#FFD700','#c8a000',3);ctx.restore();
  rr(CW*.285,CH*.013,CW*.43,CH*.065,5,'rgba(255,255,255,.2)',null);
  txt('🏝️ ISLA PRIVADA',CW*.5,CH*.046,`900 ${~~(11.5*s)}px "Fredoka One",cursive`,'#1a0a00');

  // RECEPTION COUNTER
  rr(CW*.84,fy-CH*.24,CW*.145,CH*.24,[5,5,0,0],'rgba(255,248,235,.9)','#FFD700',2.5);
  rr(CW*.83,fy-CH*.265,CW*.175,CH*.05,[4,4,0,0],'rgba(255,240,200,.95)','#FFD700',2.5);
  ctx.save();ctx.shadowColor='#FFD700';ctx.shadowBlur=8;
  rr(CW*.855,fy-CH*.235,CW*.09,CH*.12,3,'rgba(255,248,200,.9)','#FFD700',1.5);
  txt('🌴 BIENVENIDO',CW*.9,fy-CH*.195,`700 ${~~(5.2*s)}px Nunito`,'#8B6914');
  txt('ISLA PRIVADA 🏝️',CW*.9,fy-CH*.175,`700 ${~~(4.8*s)}px Nunito`,'#c8a000');
  ctx.restore();
  txt('RECEPCIÓN',CW*.9,fy-CH*.278,`900 ${~~(7.5*s)}px Nunito`,'#8B6914');

  // DOCK / PIER
  ctx.strokeStyle='#8B6914';ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(CW*.08,fy*.73);ctx.lineTo(CW*.08,fy*.65);ctx.stroke();
  ctx.beginPath();ctx.moveTo(CW*.18,fy*.73);ctx.lineTo(CW*.18,fy*.65);ctx.stroke();
  for(let p=0;p<8;p++){ctx.beginPath();ctx.moveTo(CW*.08,fy*(.65+p*.01));ctx.lineTo(CW*.18,fy*(.65+p*.01));ctx.stroke();}
  txt('🚢 MUELLE',CW*.13,fy*.63,`900 ${~~(5.5*s)}px Nunito`,'rgba(139,105,20,.7)');

  // ENTRANCE PATH
  const pathG=ctx.createLinearGradient(0,fy*.72,0,fy);pathG.addColorStop(0,'#b89850');pathG.addColorStop(1,'#c8a860');
  ctx.fillStyle=pathG;ctx.beginPath();ctx.moveTo(CW*.035,fy);ctx.lineTo(CW*.085,fy*.73);ctx.lineTo(CW*.135,fy*.73);ctx.lineTo(CW*.185,fy);ctx.closePath();ctx.fill();
  // Path lights
  for(let pl=0;pl<4;pl++){const plOn=Math.sin(gt*1.5+pl)>.4;ctx.save();if(plOn){ctx.shadowColor='#FFD700';ctx.shadowBlur=8;}ctx.beginPath();ctx.arc(CW*(.07+pl*.015),fy*.76+pl*CH*.02,CW*.005,0,Math.PI*2);ctx.fillStyle=plOn?'#FFD200':'#8B7000';ctx.fill();ctx.restore();}

  ctx.save();ctx.globalAlpha=.5;txt('MUELLE PRIVADO',CW*.13,fy*.61,`900 ${~~(5.5*s)}px Nunito`,'rgba(200,180,80,.6)');txt('ZONA DE VILLAS',CW*.5,CH*.68,`900 ${~~(5.5*s)}px Nunito`,'rgba(200,180,80,.4)');txt('RECEPCIÓN',CW*.9,fy-CH*.28,`900 ${~~(5.5*s)}px Nunito`,'#c8a800');ctx.restore();
}

function buildSlots(n){const fy=CH*.73;const xs=[.38,.5,.62,.74];return xs.slice(0,Math.min(n,MAX_SLOTS)).map(x=>({x:CW*x,y:fy-CH*.06,occ:false,cid:null}));}
function drawWorkers(gt){const fy=CH*.73;drawPerson({x:CW*.9,y:fy-CH*.24,scale:1,state:'idle',skin:SKINS[2],shirt:'#fff',pants:PANTS[0],hair:HAIRS[0],expr:2,bob:Math.sin(gt*.55)*.25,tool:'🌺'});drawPerson({x:CW*.36,y:fy-CH*.07,scale:.9,state:'idle',skin:SKINS[4],shirt:'#00C9A7',pants:PANTS[1],hair:HAIRS[2],expr:2,bob:Math.sin(gt*.7)*.3,tool:'🍹'});drawPerson({x:CW*.65,y:fy-CH*.07,scale:.88,state:'idle',skin:SKINS[1],shirt:'#FFD700',pants:PANTS[2],hair:HAIRS[6],expr:1,bob:Math.sin(gt*.6+1)*.28});}

const CUST_NAME='huésped';const EARN_VERB='🏝️ Estadía';

let lastT=performance.now();
function loop(now){if(_paused){lastT=now;requestAnimationFrame(loop);return;}const dt=Math.min((now-lastT)/1000,.08);lastT=now;dt_ref=dt;gt+=dt;G.elapsed+=dt;if(G.boost&&Date.now()>G.boostEnd){G.boost=false;nlog('⚡ Boost terminó','bad');}spawnTimer+=dt;if(spawnTimer>=spawnRate()){spawnTimer=0;trySpawn();}for(let i=clients.length-1;i>=0;i--){const c=clients[i];c.bob+=dt*6;const dx=c.tx-c.x;if(Math.abs(dx)>2)c.x+=Math.sign(dx)*c.speed*dt;switch(c.state){case 'entering':if(Math.abs(dx)<6){c.x=c.tx;c.state='walkToSlot';c.tx=slots[c.slotIdx]?.x||CW*.4;c.y=slots[c.slotIdx]?.y||c.y;}break;case 'walkToSlot':if(Math.abs(dx)<6){c.x=c.tx;c.state='serving';c.progress=0;}break;case 'serving':c.progress+=dt/cycleTime();if(c.progress>=1)onServed(c);break;case 'waiting':c.patience-=dt/(14+nSlots()*4);if(c.patience<=0)onAngry(c);break;case 'leaving':if(Math.abs(dx)<8)clients.splice(i,1);break;}}updateFX(dt);ctx.clearRect(0,0,CW,CH);drawScene(gt);drawWorkers(gt);clients.forEach(c=>drawPerson({x:c.x,y:c.y,scale:c.scale,state:c.state==='serving'?'serving':c.state==='waiting'?'waiting':'idle',progress:c.progress,patience:c.patience,isVIP:c.isVIP,skin:c.skin,shirt:c.shirt,pants:c.pants,hair:c.hair,isAngry:c.isAngry,expr:c.expr,bob:c.bob}));drawFX();updateHUD();requestAnimationFrame(loop);}
function fmt(n){if(n>=1e9)return`$${(n/1e9).toFixed(1)}B`;if(n>=1e6)return`$${(n/1e6).toFixed(2)}M`;if(n>=1e3)return`$${(n/1e3).toFixed(1)}k`;return`$${~~n}`;}
function updateHUD(){document.getElementById('hMoney').textContent=fmt(G.money);const ips=earnPerServe()*nSlots()/cycleTime();document.getElementById('hIPS').textContent=`+${fmt(ips)}/seg`;document.getElementById('hLevel').textContent=`${BIZ_ICON} ${BIZ_NAME} — Nv.${G.level+1} ${LVL.names[G.level]}`;const req=xpReq(G.level);document.getElementById('xpFill').style.width=`${Math.min(100,(G.xp/req)*100).toFixed(1)}%`;document.getElementById('xpLbl').textContent=`${~~G.xp} / ${req} XP`;for(const k in UPGS){const u=UPGS[k],btn=document.getElementById('btn_'+k),lv=document.getElementById('lv_'+k),st=document.getElementById('st_'+k);if(!btn)continue;const cost=upgCost(k);lv.textContent=`Nv.${u.lv}`;const isMaxed=u.lv>=MAX_UPG_LV;if(isMaxed){st.innerHTML=`<b>${u.desc}</b> · <span style="color:#FFD700">👑 MÁXIMO</span>`;btn.disabled=true;btn.textContent=`👑 Nv.MAX`;btn.style.background='linear-gradient(135deg,#7B2FBE,#9B5DE5)';}else{st.innerHTML=`<b>${u.desc}</b> · <span style="color:#00C9A7">$${fmtN(cost)}</span>`;btn.disabled=G.money<cost;btn.textContent=`${u.icon} Mejorar $${fmtN(cost)}`;btn.style.background='';}}}
function fmtN(n){if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'k';return Math.floor(n).toString();}
function nlog(msg,cls){const el=document.createElement('div');el.className='nlog'+(cls?' '+cls:'');el.textContent=msg;const l=document.getElementById('notiflog');l.prepend(el);setTimeout(()=>el.remove(),4000);}
function showAchievement(icon,title,desc){const el=document.createElement('div');el.className='ach-item';el.innerHTML=`<span class="ach-icon">${icon}</span><div><div class="ach-title">${title}</div><div class="ach-desc">${desc}</div></div>`;document.getElementById('achiev').prepend(el);setTimeout(()=>el.remove(),4200);}
function triggerFlash(c){const f=document.getElementById('flash');f.style.background=c;f.classList.remove('pop');void f.offsetWidth;f.classList.add('pop');}
function activateBoost(){if(G.money<5000){nlog('💸 Necesitas $5000','bad');return;}G.money-=5000;G.boost=true;G.boostEnd=Date.now()+60000;nlog('⚡ ¡BOOST x2 por 60s!','special');}
function buyUpg(k){const cost=upgCost(k);if(window.parent&&window.parent!==window){window.parent.postMessage({type:'bizPurchase',upg:k,cost},'*');nlog('💳 Procesando...');}else{if(UPGS[k].lv>=MAX_UPG_LV){nlog('👑 ¡Mejora al máximo!','special');return;}if(G.money<cost){nlog('💸 Sin fondos','bad');return;}G.money-=cost;UPGS[k].lv++;onUpgApplied(k);}}
function onUpgApplied(k){initSlots();nlog(`${UPGS[k].icon} ${UPGS[k].name} Nv.${UPGS[k].lv}!`,'good');showAchievement(UPGS[k].icon,`¡${UPGS[k].name}!`,`Nivel ${UPGS[k].lv}`);triggerFlash(ACCENT+'33');}
window.addEventListener('message',e=>{if(!e.data)return;if(e.data.type==='bizClose')_paused=true;if(e.data.type==='purchaseDenied')nlog('💸 ¡Sin fondos!','bad');if(e.data.type==='purchaseOk'){if(UPGS[e.data.upg].lv<MAX_UPG_LV){UPGS[e.data.upg].lv++;}G.money=e.data.newMoney;onUpgApplied(e.data.upg);}if(e.data.type==='bizInit'){G.money=e.data.money||0;for(const k in UPGS){const lv=e.data[k+'Level']||1;UPGS[k].lv=lv;}initSlots();nlog(`${BIZ_ICON} ¡${BIZ_NAME} abierto!`,'good');}});
document.addEventListener('visibilitychange',()=>{_paused=document.hidden;});
if(window.parent&&window.parent!==window)window.parent.postMessage({type:'bizReady'},'*');
initSlots();nlog(`${BIZ_ICON} ¡${BIZ_NAME} listo!`,'good');requestAnimationFrame(loop);
</script>
