<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>🛫 Aerolínea Imperio</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Nunito',sans-serif}
#wrapper{width:100vw;max-width:1280px;aspect-ratio:16/9;position:relative;background:#0a1628;overflow:hidden}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#header{position:absolute;top:0;left:0;right:0;height:10.5%;background:linear-gradient(180deg,#060e1e,#0b1830);border-bottom:3px solid #0077B6;display:flex;align-items:center;padding:0 1.5%;gap:2%;z-index:20}
.hm-block{display:flex;flex-direction:column;min-width:17%}
.hm-label{font-size:clamp(6px,.65vw,10px);font-weight:900;color:#445;text-transform:uppercase;letter-spacing:1px}
.hm-val{font-family:'Fredoka One',cursive;font-size:clamp(15px,2vw,30px);color:#00B4D8;line-height:1}
.hm-sub{font-size:clamp(6px,.6vw,9px);font-weight:900;color:#4cd964}
.hdr-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.level-name{font-family:'Fredoka One',cursive;font-size:clamp(9px,1vw,15px);color:#fff}
.xp-bg{width:100%;max-width:300px;height:8px;background:rgba(255,255,255,.08);border-radius:99px;border:1px solid rgba(255,255,255,.12);overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,#0077B6,#00B4D8);border-radius:99px;transition:width .4s ease}
.xp-lbl{font-size:clamp(5px,.55vw,8px);color:#888;font-weight:900}
.hdr-right{display:flex;align-items:center;gap:.8%;min-width:22%;justify-content:flex-end}
.hbtn{background:#0a1e3a;color:#fff;font-family:'Fredoka One',cursive;font-size:clamp(8px,.85vw,13px);padding:.35em .8em;border:2px solid rgba(255,255,255,.12);border-radius:99px;cursor:pointer;transition:transform .1s}
.hbtn:hover{transform:translateY(-2px)}
.hbtn.red{background:#0a3a6a;border-color:#00B4D8}
.combo-badge{background:linear-gradient(135deg,#0077B6,#00B4D8);color:#fff;font-family:'Fredoka One',cursive;font-size:clamp(7px,.75vw,11px);padding:.3em .7em;border-radius:99px;border:2px solid rgba(255,255,255,.3);display:none;animation:cbPop .4s cubic-bezier(.34,1.56,.64,1)}
.combo-badge.show{display:block}@keyframes cbPop{from{transform:scale(0)}to{transform:scale(1)}}
#panel{position:absolute;bottom:0;left:0;right:0;height:27%;background:linear-gradient(0deg,#060e1e,#0b1830);border-top:3px solid #0077B6;display:grid;grid-template-columns:repeat(5,1fr);z-index:20}
.upg-col{border-right:1px solid rgba(255,255,255,.05);padding:clamp(4px,.7vw,10px) clamp(5px,.9vw,12px);display:flex;flex-direction:column;gap:4px}
.upg-col:last-child{border-right:none}
.upg-top{display:flex;align-items:center;gap:5px}
.upg-emo{font-size:clamp(12px,1.6vw,24px)}
.upg-title{font-family:'Fredoka One',cursive;font-size:clamp(8px,.95vw,14px);color:#fff;flex:1}
.upg-lv{background:#0077B6;color:#fff;font-weight:900;font-size:clamp(5px,.58vw,9px);padding:2px 5px;border-radius:99px}
.upg-stat{font-size:clamp(6px,.62vw,9px);color:#aaa;font-weight:700;line-height:1.3}
.upg-stat b{color:#4cd964}
.upg-btn{margin-top:auto;background:linear-gradient(135deg,#0077B6,#005a8a);color:#fff;font-family:'Fredoka One',cursive;font-size:clamp(8px,.85vw,13px);padding:.4em .8em;border:none;border-radius:99px;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.4);transition:transform .1s;width:100%}
.upg-btn:hover:not(:disabled){transform:translateY(-2px)}
.upg-btn:disabled{background:linear-gradient(135deg,#333,#2a2a2a);color:#555;cursor:not-allowed;box-shadow:none}
#achiev{position:absolute;top:13%;right:2%;z-index:50;pointer-events:none;display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.ach-item{background:linear-gradient(135deg,#060e1e,#0b1830);border:2px solid #00B4D8;border-radius:12px;padding:8px 14px;display:flex;align-items:center;gap:8px;animation:achIn .4s cubic-bezier(.34,1.56,.64,1),achOut .4s ease 3.5s forwards;max-width:260px}
@keyframes achIn{from{transform:translateX(120%);opacity:0}to{transform:none;opacity:1}}
@keyframes achOut{to{opacity:0;transform:translateX(120%)}}
.ach-icon{font-size:1.4rem}.ach-title{font-family:'Fredoka One',cursive;font-size:.8rem;color:#00B4D8}.ach-desc{font-size:.6rem;color:#aaa;font-weight:700}
#notiflog{position:absolute;bottom:28%;left:1.5%;z-index:30;pointer-events:none;display:flex;flex-direction:column-reverse;gap:3px}
.nlog{font-size:clamp(7px,.68vw,10px);font-weight:900;padding:3px 9px;border-radius:5px;background:rgba(0,0,0,.65);animation:nIn .25s ease,nOut .3s ease 3s forwards;border-left:3px solid #00B4D8;color:#fff;max-width:270px}
.nlog.good{border-color:#4cd964;color:#4cd964}.nlog.bad{border-color:#e74c3c;color:#e74c3c}.nlog.special{border-color:#00B4D8;color:#00B4D8}
@keyframes nIn{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:none}}
@keyframes nOut{to{opacity:0;transform:translateX(-18px)}}
#flash{position:absolute;inset:0;pointer-events:none;z-index:60;opacity:0}
#flash.pop{animation:flashPop .35s ease}
@keyframes flashPop{0%{opacity:.3}100%{opacity:0}}
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="c"></canvas>
  <div id="header">
    <div class="hm-block">
      <div class="hm-label">💰 Caja</div>
      <div class="hm-val" id="hMoney">$0</div>
      <div class="hm-sub" id="hIPS">+$0/seg</div>
    </div>
    <div class="hdr-center">
      <div class="level-name" id="hLevel">🛫 Aerolínea Imperio</div>
      <div class="xp-bg"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
      <div class="xp-lbl" id="xpLbl">0 / 100 XP</div>
    </div>
    <div class="hdr-right">
      <div class="combo-badge" id="comboBadge">🔥 COMBO x1</div>
      <button class="hbtn red" onclick="activateBoost()">⚡ Boost x2 — $1500</button>
    </div>
  </div>
  <div id="panel">
    <div class="upg-col">
      <div class="upg-top"><span class="upg-emo">🛫</span><span class="upg-title">Más Vuelos</span><span class="upg-lv" id="lv_flota">Nv.1</span></div>
      <div class="upg-stat" id="st_flota"><b>Capacidad +1</b></div>
      <button class="upg-btn" id="btn_flota" onclick="buyUpg('flota')" disabled>🛫 Mejorar $...</button>
    </div>
    <div class="upg-col">
      <div class="upg-top"><span class="upg-emo">👨‍✈️</span><span class="upg-title">Pilotos Elite</span><span class="upg-lv" id="lv_pilotos">Nv.1</span></div>
      <div class="upg-stat" id="st_pilotos"><b>Ciclo -20%</b></div>
      <button class="upg-btn" id="btn_pilotos" onclick="buyUpg('pilotos')" disabled>👨‍✈️ Mejorar $...</button>
    </div>
    <div class="upg-col">
      <div class="upg-top"><span class="upg-emo">🥂</span><span class="upg-title">Clase Business</span><span class="upg-lv" id="lv_business">Nv.1</span></div>
      <div class="upg-stat" id="st_business"><b>Precio +30%</b></div>
      <button class="upg-btn" id="btn_business" onclick="buyUpg('business')" disabled>🥂 Mejorar $...</button>
    </div>
    <div class="upg-col">
      <div class="upg-top"><span class="upg-emo">🌟</span><span class="upg-title">Primera Clase</span><span class="upg-lv" id="lv_primera">Nv.1</span></div>
      <div class="upg-stat" id="st_primera"><b>Precio +35%</b></div>
      <button class="upg-btn" id="btn_primera" onclick="buyUpg('primera')" disabled>🌟 Mejorar $...</button>
    </div>
    <div class="upg-col">
      <div class="upg-top"><span class="upg-emo">📢</span><span class="upg-title">Rutas Nuevas</span><span class="upg-lv" id="lv_rutas">Nv.1</span></div>
      <div class="upg-stat" id="st_rutas"><b>Más pasajeros</b></div>
      <button class="upg-btn" id="btn_rutas" onclick="buyUpg('rutas')" disabled>📢 Mejorar $...</button>
    </div>
  </div>
  <div id="achiev"></div>
  <div id="notiflog"></div>
  <div id="flash"></div>
</div>
<script>
const SHIRTS=['#0077B6','#00B4D8','#fff','#e74c3c','#FFD700','#2DC653','#9B5DE5','#FF8C42','#1abc9c','#3498db'];
const PANTS=['#1a2540','#1b2a4a','#16213e','#2c3e50','#1a1a2e','#2D2B3D','#34495e','#0f1e38'];
const SKINS=['#FDBCB4','#E8975A','#C07A3A','#8B5E3C','#6B3E26','#4A2C0A'];
const HAIRS=['#1a1a1a','#4a2c0a','#C07A3A','#FFD200','#e8e8e8','#FF4757','#9B5DE5'];

let particles=[],floats=[],bills=[];
function spawnParticles(x,y,color,n=12){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=40+Math.random()*80;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-40,life:1,color,r:2+Math.random()*3});}}
function spawnFloat(x,y,text,color='#00B4D8',big=false){floats.push({x,y:y-5,text,t:0,color,big});}
function spawnBills(x,y){for(let i=0;i<8;i++)bills.push({x:x+(Math.random()-.5)*60,y,vx:(Math.random()-.5)*50,vy:-70-Math.random()*50,life:1,rot:Math.random()*Math.PI,rotV:(Math.random()-.5)*3});}
function updateFX(dt){particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=180*dt;p.life-=dt*1.4;});particles=particles.filter(p=>p.life>0);floats.forEach(f=>{f.y-=28*dt;f.t+=dt;});floats=floats.filter(f=>f.t<1.8);bills.forEach(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt;b.vy+=120*dt;b.rot+=b.rotV*dt;b.life-=dt*1.2;});bills=bills.filter(b=>b.life>0);}
function drawFX(){particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();});bills.forEach(b=>{ctx.save();ctx.globalAlpha=b.life*.8;ctx.translate(b.x,b.y);ctx.rotate(b.rot);rr(-13,-6,26,12,3,'#2DC653','#1a5c28',1.5);ctx.font=`bold 8px Nunito`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#1a5c28';ctx.fillText('$',0,0);ctx.restore();});floats.forEach(f=>{const alpha=Math.max(0,1-f.t/1.6);const fs=f.big?~~(CW*.016):~~(CW*.013);ctx.save();ctx.globalAlpha=alpha;ctx.font=`900 ${fs}px "Fredoka One",cursive`;ctx.textAlign='center';ctx.textBaseline='middle';const tw=ctx.measureText(f.text).width,pad=f.big?12:8;rr(f.x-tw/2-pad,f.y-fs/2-4,tw+pad*2,fs+9,6,'rgba(0,0,0,.65)',f.color,f.big?2.5:1.5);ctx.fillStyle=f.color;ctx.fillText(f.text,f.x,f.y);ctx.restore();});ctx.globalAlpha=1;}
function rr(x,y,w,h,r,fill,stroke,lw=2){ctx.beginPath();ctx.roundRect(x,y,w,h,r);if(fill){ctx.fillStyle=fill;ctx.fill();}if(stroke){ctx.lineWidth=lw;ctx.strokeStyle=stroke;ctx.stroke();}}
function txt(t,x,y,font,color,align='center'){ctx.font=font;ctx.fillStyle=color;ctx.textAlign=align;ctx.textBaseline='middle';ctx.fillText(t,x,y);}

function drawPerson(cfg){
  const {x,y,scale:sc=1,state='idle',progress=0,isVIP=false,skin,shirt,pants,hair,isAngry=false,expr=0,bob=0,ws=1,tool=null}=cfg;
  const s=sc*(CW/1280);
  ctx.save();ctx.translate(x,y);ctx.scale(s,s);
  const ls=Math.sin(bob)*8;
  ctx.save();ctx.translate(-6*ws,0);ctx.rotate(ls*Math.PI/180);rr(-5*ws,0,10*ws,22,3,pants,'#1a1a2e',1.5);rr(-7*ws,20,13*ws,8,2,'#222','#1a1a2e',1.2);ctx.restore();
  ctx.save();ctx.translate(6*ws,0);ctx.rotate(-ls*Math.PI/180);rr(-5*ws,0,10*ws,22,3,pants,'#1a1a2e',1.5);rr(-5*ws,20,13*ws,8,2,'#222','#1a1a2e',1.2);ctx.restore();
  const bodyY=Math.sin(bob+Math.PI*.5)*2;ctx.save();ctx.translate(0,bodyY);
  rr(-16*ws,-26,32*ws,30,7,shirt,'#1a1a2e',1.5);rr(-7*ws,-26,14*ws,8,2,'rgba(255,255,255,.18)',null);
  const arm=Math.sin(bob+Math.PI)*6;
  ctx.save();ctx.translate(-16*ws,-20);ctx.rotate(arm*Math.PI/180);rr(-4*ws,0,8*ws,18,3,skin,'#1a1a2e',1.2);ctx.restore();
  ctx.save();ctx.translate(16*ws,-20);ctx.rotate(-arm*Math.PI/180);rr(-4*ws,0,8*ws,18,3,skin,'#1a1a2e',1.2);ctx.restore();
  if(tool){ctx.font=`${~~18}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(tool,26*ws,-16);}
  rr(-17*ws,-62,34*ws,36,[14,14,12,12],skin,'#1a1a2e',2);
  ctx.beginPath();ctx.ellipse(0,-62,17*ws,12,0,Math.PI,0);ctx.fillStyle=hair;ctx.fill();ctx.strokeStyle='#1a1a2e';ctx.lineWidth=1.5;ctx.stroke();
  if(isVIP){ctx.font='16px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('👑',0,-80);}
  [[-7,-51],[7,-51]].forEach(([ex,ey])=>{rr(ex-5.5,ey-6,11,12,[5,5,5,5],'white','#1a1a2e',1.5);if(isAngry){ctx.save();ctx.translate(ex,ey);ctx.rotate(.3*(ex<0?1:-1));ctx.beginPath();ctx.ellipse(0,0,3.5,4.5,0,0,Math.PI*2);ctx.fillStyle='#1a1a2e';ctx.fill();ctx.restore();ctx.strokeStyle='#1a1a2e';ctx.lineWidth=2;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(ex-5,ey-7);ctx.lineTo(ex+5,ey-10);ctx.stroke();}else{ctx.beginPath();ctx.ellipse(ex+.5,ey-.5,3.5,4.5,0,0,Math.PI*2);ctx.fillStyle='#1a1a2e';ctx.fill();ctx.beginPath();ctx.arc(ex+1.5,ey-2,1.3,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();}});
  ctx.strokeStyle='#1a1a2e';ctx.lineWidth=1.5;ctx.beginPath();if(isAngry)ctx.arc(0,-42,5,.2,Math.PI-.2,true);else if(expr===0)ctx.arc(0,-42,6,.1,Math.PI-.1);else if(expr===2){ctx.arc(0,-42,7,.05,Math.PI-.05);ctx.fillStyle='#FF6B6B';ctx.fill();}else ctx.moveTo(-5,-42),ctx.lineTo(5,-42);ctx.stroke();
  ctx.restore();ctx.restore();
  if(state==='serving'||state==='seated'){const bw=52*s,bh=9,px2=x-bw/2,py2=y-(78)*s;rr(px2,py2,bw,bh,3,'rgba(0,0,0,.6)',null);const col=progress>.66?'#4cd964':progress>.33?'#00B4D8':'#e74c3c';rr(px2+2,py2+2,(bw-4)*progress,bh-4,2,col,null);rr(px2,py2,bw,bh,3,null,'rgba(0,0,0,.5)',1);txt(`${~~(progress*100)}%`,x,py2-9,`700 ${~~(8*s)}px Nunito`,col);}
  if(state==='waiting'){const patience=cfg.patience||1;const bw=42*s,bh=7,px2=x-bw/2,py2=y-(78)*s;rr(px2,py2,bw,bh,3,'rgba(0,0,0,.45)',null);const col=patience>.55?'#00B4D8':patience>.25?'#FF6348':'#e74c3c';rr(px2+1.5,py2+1.5,(bw-3)*patience,bh-3,2,col,null);const em=patience>.6?'😊':patience>.3?'😐':'😤';ctx.font=`${~~(11*s)}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(em,x,py2-11*s);}
}

const BIZ_ID='aereolinea';const BIZ_ICON='🛫';const BIZ_NAME='Aerolínea Imperio';const ACCENT='#00B4D8';
const MAX_SLOTS=4;const MAX_UPG_LV=5;
let BIZ_IS_MAXED=false;
const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');
let CW,CH;function resize(){const wr=document.getElementById('wrapper');CW=canvas.width=wr.clientWidth;CH=canvas.height=wr.clientHeight;}resize();window.addEventListener('resize',resize);

const UPGS={flota:{lv:0,base:450000,icon:'🛫',name:'Más Vuelos',desc:'Capacidad +1'},pilotos:{lv:0,base:900000,icon:'👨‍✈️',name:'Pilotos Elite',desc:'Ciclo -20%'},business:{lv:0,base:1650000,icon:'🥂',name:'Clase Business',desc:'Precio +30%'},primera:{lv:0,base:3000000,icon:'🌟',name:'Primera Clase',desc:'Precio +35%'},rutas:{lv:0,base:5400000,icon:'📢',name:'Rutas Nuevas',desc:'Más pasajeros'}};
function upgCost(k){const u=UPGS[k];return Math.floor(u.base*Math.pow(1.55,u.lv-1));}
function nSlots(){return Math.min(MAX_SLOTS,1+(UPGS.flota?.lv||1)-1);}
function cycleTime(){const spd=UPGS.pilotos;return Math.max(1.5,BASE_CYCLE*(spd?Math.pow(0.82,spd.lv-1):1));}
function spawnRate(){const mkt=UPGS.rutas;return Math.max(0.6,BASE_SPAWN*(mkt?Math.pow(0.85,mkt.lv-1):1));}
function earnPerServe(){let m=BASE_EARN;for(const k in UPGS){const u=UPGS[k];if(['business','primera'].includes(k))m*=(1+(u.lv-1)*.25);}m*=(G.boost&&Date.now()<G.boostEnd?2:1);m*=(1+(_prestige*.2));return Math.floor(m);}

const BASE_EARN=3000;const BASE_CYCLE=15;const BASE_SPAWN=4;
let _prestige=0,_paused=false,_earnedQ=0;
const G={money:0,totalEarned:0,xp:0,level:0,served:0,combo:0,maxCombo:0,streak:0,boost:false,boostEnd:0,elapsed:0};
const LVL={names:['Auxiliar','Co-Piloto','Piloto','Capitán','Comandante','Almirante','Rey del Aire'],xp:[200,600,1500,4000,10000,25000,60000]};
function xpReq(l){return LVL.xp[Math.min(l,LVL.xp.length-1)];}
function addXP(a){G.xp+=a;while(G.level<LVL.names.length-1&&G.xp>=xpReq(G.level)){G.xp-=xpReq(G.level);G.level++;triggerFlash(ACCENT+'44');showAchievement('🏆',`¡Nivel ${G.level+1}!`,LVL.names[G.level]);nlog(`🏆 Nivel ${G.level+1} — ${LVL.names[G.level]}`,'special');}}

let clients=[],spawnTimer=0,cid=0;
class Client{constructor(){this.id=cid++;this.x=CW*-.04;this.y=0;this.tx=CW*.12;this.state='entering';this.slotIdx=-1;this.progress=0;this.patience=1;this.speed=(100+Math.random()*50)*(CW/1280);this.bob=Math.random()*Math.PI*2;this.isVIP=Math.random()<.15;this.isAngry=false;this.skin=SKINS[~~(Math.random()*SKINS.length)];this.shirt=SHIRTS[~~(Math.random()*SHIRTS.length)];this.pants=PANTS[~~(Math.random()*PANTS.length)];this.hair=HAIRS[~~(Math.random()*HAIRS.length)];this.expr=~~(Math.random()*3);this.scale=this.isVIP?1.1:[.85,.9,1,1,1.05][~~(Math.random()*5)];}}

let slots=[];
function initSlots(){const n=Math.min(MAX_SLOTS,nSlots());slots=buildSlots(n);}
function trySpawn(){const free=slots.findIndex((s,i)=>!s.occ&&i<nSlots());if(free<0)return;const c=new Client();c.y=slots[free].y;c.tx=CW*.11;clients.push(c);slots[free].occ=true;slots[free].cid=c.id;c.slotIdx=free;nlog(`${c.isVIP?'🌟 VIP':'🧳 '+(CUST_NAME)} llega`);}
function onServed(c){const inc=earnPerServe()*(c.isVIP?2:1)*(1+G.streak*.015);G.money+=inc;G.totalEarned+=inc;_earnedQ+=inc;addXP(inc*.1);G.served++;G.streak++;G.combo++;if(G.combo>G.maxCombo)G.maxCombo=G.combo;if(G.combo>=3){document.getElementById('comboBadge').textContent=`🔥 COMBO x${G.combo}`;document.getElementById('comboBadge').classList.add('show');}if(_earnedQ>=3){window.parent?.postMessage({type:'bizEarned',earned:_earnedQ,xp:_earnedQ*.08},'*');_earnedQ=0;}spawnFloat(c.x,c.y-70*(c.scale*(CW/1280)),`+$${fmt(inc)}`,c.isVIP?'#FFD700':'#4cd964',c.isVIP);spawnParticles(c.x,c.y-50*(c.scale*(CW/1280)),c.isVIP?'#FFD700':'#00B4D8',c.isVIP?18:10);if(c.isVIP||G.combo%5===0)spawnBills(c.x,c.y-60*(c.scale*(CW/1280)));nlog(`${EARN_VERB} +${fmt(inc)}${c.isVIP?' 🌟 VIP':''}${G.combo>=3?' 🔥':''}`,c.isVIP?'special':'good');checkAchievements();if(c.slotIdx>=0){slots[c.slotIdx].occ=false;slots[c.slotIdx].cid=null;}c.slotIdx=-1;c.state='leaving';c.tx=CW*1.08;}
function onAngry(c){G.streak=0;G.combo=0;document.getElementById('comboBadge').classList.remove('show');if(c.slotIdx>=0){slots[c.slotIdx].occ=false;slots[c.slotIdx].cid=null;}c.slotIdx=-1;c.isAngry=true;c.state='leaving';c.tx=CW*-.08;spawnFloat(c.x,c.y-60*(c.scale*(CW/1280)),'😤 ¡Se fue!','#e74c3c');nlog('😤 ¡Pasajero se fue enojado!','bad');checkAchievements();}
const ACHIEVEMENTS=[{id:'first',icon:'🎉',title:'¡Primer vuelo!',desc:'Bienvenido a las alturas',check:()=>G.served>=1},{id:'ten',icon:'✨',title:'10 vuelos',desc:'La flota crece',check:()=>G.served>=10},{id:'combo5',icon:'🔥',title:'Combo x5',desc:'¡Despegue total!',check:()=>G.maxCombo>=5},{id:'rich',icon:'💰',title:'$50,000',desc:'Aerolínea real',check:()=>G.money>=50000},{id:'rich2',icon:'🤑',title:'$500,000',desc:'Imperio del aire',check:()=>G.money>=500000},];
const _ach={};function checkAchievements(){ACHIEVEMENTS.forEach(a=>{if(!_ach[a.id]&&a.check()){_ach[a.id]=1;showAchievement(a.icon,a.title,a.desc);}});}

// Avión animado en pista
let planeX=-0.15;let planeAlt=0;let planeState='taxiing';let planeTimer=0;

let gt=0,dt_ref=0.016;
function drawScene(gt){
  const s=CW/1280,fy=CH*.73;

  // SKY GRADIENT — deep blue twilight
  const skyG=ctx.createLinearGradient(0,0,0,fy);
  skyG.addColorStop(0,'#020c1e');skyG.addColorStop(.4,'#0a2040');skyG.addColorStop(.7,'#1a4a6a');skyG.addColorStop(1,'#2a6080');
  ctx.fillStyle=skyG;ctx.fillRect(0,0,CW,fy);

  // STARS
  ctx.save();ctx.globalAlpha=.7;
  for(let i=0;i<80;i++){const sx=((i*137.5)%1)*CW,sy=((i*97.3)%1)*(fy*.5);const twinkle=.4+Math.sin(gt*1.5+i)*.3;ctx.globalAlpha=twinkle*.5;ctx.beginPath();ctx.arc(sx,sy,.8+Math.sin(i)*.6,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();}ctx.restore();

  // MOON
  ctx.save();ctx.shadowColor='rgba(180,220,255,.5)';ctx.shadowBlur=20;ctx.beginPath();ctx.arc(CW*.88,CH*.1,CW*.025,0,Math.PI*2);ctx.fillStyle='#e8f4ff';ctx.fill();ctx.restore();

  // DISTANT CITY LIGHTS (horizon)
  for(let b=0;b<30;b++){const bx=b*CW/30,bh=CH*(.04+Math.sin(b*3.7)*.03),bw=CW*.025;rr(bx,fy-CH*.06-bh,bw,bh,1,'#1a3050',null);// windows
  for(let w=0;w<3;w++){const wy=fy-CH*.06-bh+w*bh/4+CH*.005;if(Math.sin(gt*.3+b+w)>.2){ctx.save();ctx.shadowColor='#FFD200';ctx.shadowBlur=3;rr(bx+bw*.15+w*bw*.2,wy,bw*.15,bh*.08,1,'#FFD200',null);ctx.restore();}}}

  // TARMAC / RUNWAY
  const tarmacG=ctx.createLinearGradient(0,fy-CH*.07,0,fy);
  tarmacG.addColorStop(0,'#1a1a1a');tarmacG.addColorStop(1,'#111');
  ctx.fillStyle=tarmacG;ctx.fillRect(0,fy-CH*.07,CW,CH*.07);
  // Runway center line lights
  for(let l=0;l<20;l++){const lx=l*CW/20+CW/40;const lit=Math.sin(gt*3+l*.5)>.3;ctx.save();if(lit){ctx.shadowColor='#FFD200';ctx.shadowBlur=8;}ctx.beginPath();ctx.arc(lx,fy-CH*.035,CW*.005,0,Math.PI*2);ctx.fillStyle=lit?'#FFD200':'#555';ctx.fill();ctx.restore();}
  // Yellow runway edge lines
  ctx.save();ctx.strokeStyle='#FFD20088';ctx.lineWidth=2;ctx.setLineDash([CW*.03,CW*.02]);
  ctx.beginPath();ctx.moveTo(0,fy-CH*.065);ctx.lineTo(CW,fy-CH*.065);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,fy-CH*.008);ctx.lineTo(CW,fy-CH*.008);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();

  // AIRPLANE on runway — animated takeoff cycle
  planeTimer+=dt_ref;
  if(planeState==='taxiing'){planeX+=dt_ref*.06;if(planeX>0.35){planeState='accelerating';}}
  else if(planeState==='accelerating'){planeX+=dt_ref*.18;if(planeX>0.75){planeState='liftoff';planeAlt=0;}}
  else if(planeState==='liftoff'){planeX+=dt_ref*.3;planeAlt+=dt_ref*.15;if(planeX>1.3){planeX=-0.15;planeAlt=0;planeState='taxiing';}}
  const px=CW*planeX,py=fy-CH*.045-planeAlt*CH*.4;
  ctx.save();
  if(planeState==='liftoff')ctx.rotate(-Math.min(planeAlt*.4,.3));
  ctx.translate(px,py);
  ctx.font=`${~~(planeState==='taxiing'?24*s:28*s)}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('✈️',0,0);
  // Jet exhaust
  if(planeState==='accelerating'||planeState==='liftoff'){ctx.save();ctx.globalAlpha=.4+Math.sin(gt*10)*.2;ctx.fillStyle='rgba(180,120,50,0.5)';ctx.beginPath();ctx.ellipse(-CW*.04,0,CW*.03,CH*.01,0,0,Math.PI*2);ctx.fill();ctx.restore();}
  ctx.restore();

  // TERMINAL BUILDING
  rr(CW*.2,CH*.08,CW*.6,CH*.56,5,'#0d1e38','#0077B6',2.5);
  rr(CW*.205,CH*.09,CW*.59,CH*.54,4,'rgba(0,0,0,.3)',null);
  // Glass windows on terminal
  for(let row=0;row<4;row++)for(let col=0;col<8;col++){
    const wx=CW*(.23+col*.075),wy=CH*(.12+row*.1);
    const lit=Math.sin(gt*.2+row*2+col*1.5)>.0;
    ctx.save();if(lit){ctx.shadowColor='#00B4D8';ctx.shadowBlur=6;}
    rr(wx,wy,CW*.06,CH*.07,3,`rgba(0,${~~(80+lit?120:40)},${~~(180+lit?56:0)},.${lit?6:2})`,null);
    ctx.restore();
  }
  // Terminal sign
  ctx.save();ctx.shadowColor='#00B4D8';ctx.shadowBlur=15+Math.sin(gt)*.5;
  rr(CW*.3,CH*.008,CW*.4,CH*.075,5,'#0077B6','#00B4D8',2);ctx.restore();
  txt('✈️ AEROLÍNEA IMPERIO',CW*.5,CH*.046,`900 ${~~(11*s)}px "Fredoka One",cursive`,'#fff');

  // CONTROL TOWER
  rr(CW*.83,CH*.08,CW*.04,CH*.48,3,'#0d2040','#0077B6',2);
  rr(CW*.81,CH*.08,CW*.08,CH*.08,3,'#1a3a60','#00B4D8',2);
  // Rotating radar
  ctx.save();ctx.translate(CW*.85,CH*.12);ctx.rotate(gt*.8);
  ctx.strokeStyle='#00B4D8';ctx.lineWidth=1.5;ctx.globalAlpha=.7;
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(CW*.025,0);ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,CW*.025,0,Math.PI*2);ctx.stroke();ctx.restore();
  // Blinking beacon
  const beaconOn=Math.sin(gt*4)>.6;
  ctx.save();ctx.shadowColor=beaconOn?'#e74c3c':'transparent';ctx.shadowBlur=beaconOn?15:0;
  ctx.beginPath();ctx.arc(CW*.85,CH*.078,CW*.008,0,Math.PI*2);ctx.fillStyle=beaconOn?'#e74c3c':'#440000';ctx.fill();ctx.restore();

  // CHECK-IN COUNTER
  rr(CW*.84,fy-CH*.24,CW*.145,CH*.24,[5,5,0,0],'#0d1e38','#0077B6',2.5);
  rr(CW*.83,fy-CH*.265,CW*.175,CH*.05,[4,4,0,0],'#1a3050','#0077B6',2.5);
  // Screen on counter
  ctx.save();ctx.shadowColor='#00B4D8';ctx.shadowBlur=8;
  rr(CW*.855,fy-CH*.235,CW*.09,CH*.12,3,'#060e1e','#00B4D8',1.5);
  txt('✈ VUELO IMP-001',CW*.9,fy-CH*.195,`700 ${~~(5*s)}px Nunito`,'#00B4D8');
  txt('🟢 ON TIME',CW*.9,fy-CH*.175,`700 ${~~(5*s)}px Nunito`,'#4cd964');
  ctx.restore();
  txt('CHECK-IN',CW*.9,fy-CH*.278,`900 ${~~(7.5*s)}px Nunito`,'#00B4D8');

  // GATE ENTRANCE
  rr(CW*.005,fy-CH*.38,CW*.115,CH*.38,[4,4,0,0],'#0d1e38','#0077B6',2);
  rr(CW*.01,fy-CH*.36,CW*.047,CH*.3,3,'rgba(0,180,216,.15)','#0077B6',1.5);
  rr(CW*.062,fy-CH*.36,CW*.047,CH*.3,3,'rgba(0,180,216,.15)','#0077B6',1.5);
  // Gate number
  ctx.save();ctx.shadowColor='#00B4D8';ctx.shadowBlur=10;
  txt('GATE A1',CW*.062,fy-CH*.39,`900 ${~~(6*s)}px Nunito`,'#00B4D8');ctx.restore();
  // Gate light
  const gateOn=Math.sin(gt*2)>.3;
  ctx.save();ctx.shadowColor=gateOn?'#4cd964':'transparent';ctx.shadowBlur=gateOn?12:0;
  ctx.beginPath();ctx.arc(CW*.062,fy-CH*.42,CW*.012,0,Math.PI*2);ctx.fillStyle=gateOn?'#4cd964':'#0a3020';ctx.fill();ctx.restore();

  // Departure board
  rr(CW*.2,fy-CH*.24,CW*.6,CH*.16,[4,4,0,0],'#060e1e','#0077B6',1.5);
  txt('SALIDAS / DEPARTURES',CW*.5,fy-CH*.23,`900 ${~~(7*s)}px Nunito`,'#0077B6');
  const flights=[['SD 101','SDQ→MIA','🟢 BOARDING'],['SD 205','SDQ→JFK','🟡 DELAYED'],['SD 308','SDQ→MAD','🟢 ON TIME'],['SD 412','SDQ→BOG','⬛ LANDED']];
  flights.forEach((f,i)=>{
    const fy2=fy-CH*.21+i*CH*.047;
    rr(CW*(.21+i*.001),fy2,CW*.585,CH*.04,2,i%2===0?'rgba(0,119,182,.1)':'transparent',null);
    txt(f[0],CW*.28,fy2+CH*.02,`700 ${~~(5.5*s)}px Nunito`,'#aaa');
    txt(f[1],CW*.46,fy2+CH*.02,`700 ${~~(5.5*s)}px Nunito`,'#ddd');
    txt(f[2],CW*.7,fy2+CH*.02,`700 ${~~(5.5*s)}px Nunito`,'#4cd964');
  });

  ctx.save();ctx.globalAlpha=.5;txt('GATE A1',CW*.062,fy-CH*.45,`900 ${~~(5.5*s)}px Nunito`,'rgba(0,180,216,.7)');txt('BOARDING',CW*.5,CH*.7,`900 ${~~(5.5*s)}px Nunito`,'rgba(0,180,216,.4)');txt('CHECK-IN',CW*.9,fy-CH*.28,`900 ${~~(5.5*s)}px Nunito`,'#0077B6');ctx.restore();
}

function buildSlots(n){const fy=CH*.73;const xs=[.38,.5,.62,.74];return xs.slice(0,Math.min(n,MAX_SLOTS)).map(x=>({x:CW*x,y:fy-CH*.06,occ:false,cid:null}));}
function drawWorkers(gt){const fy=CH*.73;drawPerson({x:CW*.9,y:fy-CH*.24,scale:1,state:'idle',skin:SKINS[2],shirt:'#0077B6',pants:PANTS[0],hair:HAIRS[0],expr:0,bob:Math.sin(gt*.65)*.3,tool:'🎫'});drawPerson({x:CW*.35,y:fy-CH*.07,scale:.88,state:'idle',skin:SKINS[5],shirt:'#fff',pants:PANTS[1],hair:HAIRS[2],expr:1,bob:Math.sin(gt*.8)*.35,tool:'💼'});drawPerson({x:CW*.6,y:fy-CH*.07,scale:.9,state:'idle',skin:SKINS[1],shirt:'#0077B6',pants:PANTS[2],hair:HAIRS[4],expr:0,bob:Math.sin(gt*.55+2)*.3,tool:'📋'});}

const CUST_NAME='pasajero';const EARN_VERB='🛫 Vuelo';

let lastT=performance.now();
function loop(now){if(_paused){lastT=now;requestAnimationFrame(loop);return;}const dt=Math.min((now-lastT)/1000,.08);lastT=now;dt_ref=dt;gt+=dt;G.elapsed+=dt;if(G.boost&&Date.now()>G.boostEnd){G.boost=false;nlog('⚡ Boost terminó','bad');}spawnTimer+=dt;if(spawnTimer>=spawnRate()){spawnTimer=0;trySpawn();}for(let i=clients.length-1;i>=0;i--){const c=clients[i];c.bob+=dt*7;const dx=c.tx-c.x;if(Math.abs(dx)>2)c.x+=Math.sign(dx)*c.speed*dt;switch(c.state){case 'entering':if(Math.abs(dx)<6){c.x=c.tx;c.state='walkToSlot';c.tx=slots[c.slotIdx]?.x||CW*.4;c.y=slots[c.slotIdx]?.y||c.y;}break;case 'walkToSlot':if(Math.abs(dx)<6){c.x=c.tx;c.state='serving';c.progress=0;}break;case 'serving':c.progress+=dt/cycleTime();if(c.progress>=1)onServed(c);break;case 'waiting':c.patience-=dt/(12+nSlots()*3);if(c.patience<=0)onAngry(c);break;case 'leaving':if(Math.abs(dx)<8)clients.splice(i,1);break;}}updateFX(dt);ctx.clearRect(0,0,CW,CH);drawScene(gt);drawWorkers(gt);clients.forEach(c=>drawPerson({x:c.x,y:c.y,scale:c.scale,state:c.state==='serving'?'serving':c.state==='waiting'?'waiting':'idle',progress:c.progress,patience:c.patience,isVIP:c.isVIP,skin:c.skin,shirt:c.shirt,pants:c.pants,hair:c.hair,isAngry:c.isAngry,expr:c.expr,bob:c.bob}));drawFX();updateHUD();requestAnimationFrame(loop);}
function fmt(n){if(n>=1e9)return`$${(n/1e9).toFixed(1)}B`;if(n>=1e6)return`$${(n/1e6).toFixed(2)}M`;if(n>=1e3)return`$${(n/1e3).toFixed(1)}k`;return`$${~~n}`;}
function updateHUD(){document.getElementById('hMoney').textContent=fmt(G.money);const ips=earnPerServe()*nSlots()/cycleTime();document.getElementById('hIPS').textContent=`+${fmt(ips)}/seg`;document.getElementById('hLevel').textContent=`${BIZ_ICON} ${BIZ_NAME} — Nv.${G.level+1} ${LVL.names[G.level]}`;const req=xpReq(G.level);document.getElementById('xpFill').style.width=`${Math.min(100,(G.xp/req)*100).toFixed(1)}%`;document.getElementById('xpLbl').textContent=`${~~G.xp} / ${req} XP`;for(const k in UPGS){const u=UPGS[k],btn=document.getElementById('btn_'+k),lv=document.getElementById('lv_'+k),st=document.getElementById('st_'+k);if(!btn)continue;const cost=upgCost(k);lv.textContent=`Nv.${u.lv}`;const isMaxed=(u.lv>=MAX_UPG_LV) || BIZ_IS_MAXED;if(isMaxed){st.innerHTML=`<b>${u.desc}</b> · <span style="color:#FFD700">👑 MÁXIMO</span>`;btn.disabled=true;btn.textContent=`👑 Nv.MAX`;btn.style.background='linear-gradient(135deg,#7B2FBE,#9B5DE5)';}else{st.innerHTML=`<b>${u.desc}</b> · <span style="color:#00B4D8">$${fmtN(cost)}</span>`;btn.disabled=G.money<cost;btn.textContent=`${u.icon} Mejorar $${fmtN(cost)}`;btn.style.background='';}}}
function fmtN(n){if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'k';return Math.floor(n).toString();}
function nlog(msg,cls){const el=document.createElement('div');el.className='nlog'+(cls?' '+cls:'');el.textContent=msg;const l=document.getElementById('notiflog');l.prepend(el);setTimeout(()=>el.remove(),4000);}
function showAchievement(icon,title,desc){const el=document.createElement('div');el.className='ach-item';el.innerHTML=`<span class="ach-icon">${icon}</span><div><div class="ach-title">${title}</div><div class="ach-desc">${desc}</div></div>`;document.getElementById('achiev').prepend(el);setTimeout(()=>el.remove(),4200);}
function triggerFlash(c){const f=document.getElementById('flash');f.style.background=c;f.classList.remove('pop');void f.offsetWidth;f.classList.add('pop');}
function activateBoost(){if(G.money<1500){nlog('💸 Necesitas $1500','bad');return;}G.money-=1500;G.boost=true;G.boostEnd=Date.now()+60000;nlog('⚡ ¡BOOST x2 por 60s!','special');}
function buyUpg(k){
  if(BIZ_IS_MAXED){nlog("\uD83D\uDC51 Negocio al nivel MAX","special");return;}const cost=upgCost(k);if(window.parent&&window.parent!==window){window.parent.postMessage({type:'bizPurchase',upg:k,cost},'*');nlog('💳 Procesando...');}else{if(UPGS[k].lv>=MAX_UPG_LV){nlog('👑 ¡Mejora al máximo!','special');return;}if(G.money<cost){nlog('💸 Sin fondos','bad');return;}G.money-=cost;UPGS[k].lv++;onUpgApplied(k);}}
function onUpgApplied(k){initSlots();nlog(`${UPGS[k].icon} ${UPGS[k].name} Nv.${UPGS[k].lv}!`,'good');showAchievement(UPGS[k].icon,`¡${UPGS[k].name}!`,`Nivel ${UPGS[k].lv}`);triggerFlash(ACCENT+'33');}
window.addEventListener('message',e=>{if(!e.data)return;if(e.data.type==='bizClose')_paused=true;if(e.data.type==='purchaseDenied')nlog('💸 ¡Sin fondos!','bad');if(e.data.type==='purchaseOk'){if(UPGS[e.data.upg].lv<MAX_UPG_LV){UPGS[e.data.upg].lv++;}G.money=e.data.newMoney;onUpgApplied(e.data.upg);}if(e.data.type==='bizInit'){
    if(e.data.bizCurrentLevel!==undefined&&e.data.bizMaxLevel!==undefined){
      BIZ_IS_MAXED=e.data.bizCurrentLevel>=e.data.bizMaxLevel;
      if(BIZ_IS_MAXED)nlog('\uD83D\uDC51 Nivel MAX alcanzado','special');
    }
    const _m=e.data.money||0;
    if(typeof G!=='undefined')G.money=_m;
    const _upgs=typeof UPGS!=='undefined'?UPGS:(typeof G!=='undefined'&&G.upg?G.upg:null);
    if(_upgs){for(const k in _upgs){const lv=e.data[k+'Level'];if(lv!==undefined)_upgs[k].lv=lv;}}
    if(typeof G!=='undefined'){
      G.totalEarned=0;G.xp=0;G.level=0;
      if('rep' in G)G.rep=20;
      if('served' in G)G.served=0;
      if('combo' in G){G.combo=0;G.maxCombo=0;}
      if('streak' in G)G.streak=0;
      if('angryLeft' in G)G.angryLeft=0;
      if('boost' in G){G.boost=false;G.boostEnd=0;}
      if('elapsed' in G)G.elapsed=0;
      if('achievements' in G)G.achievements={};
    }
    if(typeof initSlots==='function')initSlots();
    if(typeof updateHUD==='function')updateHUD();
  }});
document.addEventListener('visibilitychange',()=>{_paused=document.hidden;});
if(window.parent&&window.parent!==window)window.parent.postMessage({type:'bizReady'},'*');
initSlots();nlog(`${BIZ_ICON} ¡${BIZ_NAME} listo!`,'good');requestAnimationFrame(loop);
</script>
